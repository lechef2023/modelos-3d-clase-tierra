<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo 3D con Giroscopio</title>
    <!-- Cargar Model Viewer -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.1.1/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .container {
            width: 95%; max-width: 600px;
            background: white; border-radius: 15px;
            padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
        }
        model-viewer {
            width: 100%; height: 400px;
            background-color: #f0f0f0; border-radius: 10px;
        }
        .controls { margin-top: 15px; }
        button {
            padding: 10px 20px; border: none; border-radius: 20px;
            font-size: 1em; cursor: pointer; margin: 5px; color: white;
        }
        .btn-gyro { background-color: #ff9800; }
        .btn-ar { background-color: #667eea; }
        .btn-disabled { background-color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 Modelo 3D Educativo</h1>
        <p>📱 Inclina el teléfono o usa el dedo para rotar</p>
        
        <model-viewer 
            id="modelo3d"
            src="tierra.glb" 
            alt="Modelo 3D"
            auto-rotate
            camera-controls
            ar
            ar-modes="webxr scene-viewer quick-look">
        </model-viewer>

        <div class="controls">
            <!-- Botón para activar giroscopio -->
            <button id="btnGyro" class="btn-gyro" onclick="activarGiroscopio()">🔄 Activar Rotación por Movimiento</button>
            <!-- Botón para AR -->
            <button slot="ar-button" class="btn-ar">📷 Ver en Realidad Aumentada</button>
        </div>
    </div>

    <script>
        const modelViewer = document.querySelector('#modelo3d');
        const btnGyro = document.querySelector('#btnGyro');
        let giroscopioActivo = false;

        function activarGiroscopio() {
            // 1. Verificar si es iPhone (iOS 13+ requiere permiso)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(response => {
                        if (response === 'granted') {
                            iniciarRotacion();
                        } else {
                            alert('Necesitas dar permiso para usar el giroscopio.');
                        }
                    })
                    .catch(console.error);
            } else {
                // Android y otros
                iniciarRotacion();
            }
        }

        function iniciarRotacion() {
            window.addEventListener('deviceorientation', (event) => {
                // beta: inclinación adelante/atrás (-180 a 180)
                // gamma: inclinación izquierda/derecha (-90 a 90)
                if (event.beta !== null && event.gamma !== null) {
                    // Ajustar la órbita de la cámara según la inclinación
                    modelViewer.cameraOrbit = `${event.gamma}deg ${90 - event.beta}deg auto`;
                }
            });
            
            // Cambiar estilo del botón para indicar que está activo
            btnGyro.textContent = "✅ Movimiento Activado";
            btnGyro.classList.add('btn-disabled');
            btnGyro.disabled = true;
        }
    </script>
</body>
</html>
