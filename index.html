<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo 3D Interactivo</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.1.1/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 95%;
            max-width: 600px;
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            font-size: 1.5em;
            margin-bottom: 10px;
        }
        .instructions {
            text-align: center;
            color: #666;
            font-size: 0.9em;
            margin-bottom: 15px;
        }
        model-viewer {
            width: 100%;
            height: 400px;
            background-color: #f0f0f0;
            border-radius: 10px;
        }
        .ar-button {
            background-color: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 1em;
            margin-top: 15px;
            cursor: pointer;
            display: block;
            width: 100%;
        }
        .ar-button:hover {
            background-color: #5568d3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 Modelo 3D Educativo</h1>
        <p class="instructions">👆 Rota con el dedo • Zoom con pellizco • AR para ver en tu espacio</p>
        
        <model-viewer 
            src="tierra.glb"
            alt="Modelo 3D"
            auto-rotate
            camera-controls
            ar
            ar-modes="webxr scene-viewer quick-look"
            shadow-intensity="1"
            exposure="1"
            environment-image="neutral"
            poster=""
            loading="eager">
            
            <button slot="ar-button" class="ar-button">
                📱 Ver en Realidad Aumentada
            </button>
            
        </model-viewer>
    </div>
</body>
</html>
